name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Publish to npm
        id: npm_publish
        continue-on-error: true
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to ClawHub (as skill / discovery listing)
        id: clawhub_publish
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing graph-aave-mcp v$VERSION to ClawHub as skill"
          npx --yes clawhub@latest login --no-input --token "$CLAWHUB_TOKEN"
          # Publish from a clean folder containing only SKILL.md so the CLI
          # doesn't auto-detect this as a code-plugin (presence of bin field
          # in repo package.json triggers plugin mode, which is wrong for
          # an MCP server — MCP runs outside OpenClaw, not as a plugin).
          PUBLISH_DIR=$(mktemp -d)
          cp SKILL.md "$PUBLISH_DIR/SKILL.md"
          # Bump version inside SKILL.md frontmatter to match package.json
          sed -i.bak "s/^version:.*/version: $VERSION/" "$PUBLISH_DIR/SKILL.md"
          rm -f "$PUBLISH_DIR/SKILL.md.bak"
          npx --yes clawhub@latest skill publish "$PUBLISH_DIR" \
            --slug graph-aave-mcp-v2 \
            --name "Graph Aave MCP" \
            --version "$VERSION" \
            --tags latest \
            --changelog "v$VERSION — see github.com/${{ github.repository }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version [skip ci]" || echo "nothing to commit"
          git push

      - name: Report publish results
        run: |
          echo "npm publish: ${{ steps.npm_publish.outcome }}"
          echo "clawhub publish: ${{ steps.clawhub_publish.outcome }}"
          if [ "${{ steps.npm_publish.outcome }}" != "success" ] && [ "${{ steps.clawhub_publish.outcome }}" != "success" ]; then
            echo "::error::Both publishes failed"
            exit 1
          fi
          if [ "${{ steps.npm_publish.outcome }}" != "success" ]; then
            echo "::warning::npm publish failed — check NPM_TOKEN at npmjs.com (Granular token needs read+write on graph-aave-mcp)"
          fi
          if [ "${{ steps.clawhub_publish.outcome }}" != "success" ]; then
            echo "::warning::ClawHub publish failed — check CLAWHUB_TOKEN secret"
          fi
