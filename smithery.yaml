# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - graphApiKey
    properties:
      graphApiKey:
        type: string
        description: API key for The Graph network. Required. Get one free at https://thegraph.com/studio/apikeys/
  commandFunction: |-
    config => ({
      command: 'npx',
      args: ['-y', 'graph-aave-mcp'],
      env: { GRAPH_API_KEY: config.graphApiKey }
    })
